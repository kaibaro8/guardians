spring.profiles.active=local

# Conexao com Postgre
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Driver
spring.datasource.driver-class-name=org.postgresql.Driver

#   JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Upload - blog aceita imagem OU video (BlogService), padrao do Spring (1MB) e baixo demais
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Corrige serializacao do LocalDate - retorna "2026-05-09" em vez de [2026,5,9]
spring.jackson.serialization.write-dates-as-timestamps=false

# Thymeleaf - desativa cache para sempre buscar dados frescos
spring.thymeleaf.cache=false

# OAuth2 Google
# Preencher com as credenciais do Google Cloud Console quando disponivel
# https://console.cloud.google.com - APIs e Servicos - Credenciais
#
# spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
# spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
# spring.security.oauth2.client.registration.google.scope=email,profile

logging.level.com.hegaf.guardians=DEBUG
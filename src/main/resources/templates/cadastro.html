<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/cadastro.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="cadastro-page">
	
	<div class="cadastro-card">
    <div class="card-header">
        <h2>Criar sua conta</h2>
        <p>Preencha os dados abaixo para se cadastrar.</p>
    </div>

    <div class="card-body">
        <form th:action="@{/salvar}" th:object="${usuario}" method="post" id="formCadastro">

            <div class="section-label">Dados Pessoais</div>

            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" th:field="*{nome}" placeholder="Seu nome completo" required>
                <span class="campo-erro" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
            </div>

            <div class="form-group">
                <label>E-mail</label>
                <input type="email" th:field="*{email}" placeholder="exemplo@email.com" required>
                <span class="campo-erro" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="row-2">
                <div class="form-group">
                    <label>CPF</label>
						<input type="text" th:field="*{cpf}" id="cpf" placeholder="000.000.000-00" maxlength="14" required
						       th:attr="hx-get=@{/cadastro/validar-cpf}" hx-trigger="blur changed" hx-target="#cpf-feedback">
						<span class="campo-erro" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></span>
						<span class="campo-erro" th:if="${#fields.hasErrors('cpfValido')}" th:errors="*{cpfValido}"></span>
						<span id="cpf-feedback"></span>
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" th:field="*{telefone}" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
                </div>
            </div>

            <div class="section-label">Segurança</div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" th:field="*{senha}" id="senha" placeholder="Mín. 8 caracteres" required>
                <div class="senha-requisitos" id="senha-requisitos">
                    <span id="req-tamanho">✗ Mínimo 8 caracteres</span>
                    <span id="req-maiuscula">✗ Uma letra maiúscula</span>
                    <span id="req-minuscula">✗ Uma letra minúscula</span>
                    <span id="req-numero">✗ Um número</span>
                    <span id="req-especial">✗ Um caractere especial (!@#$...)</span>
                </div>
            </div>

            <div class="form-group">
                <label>Confirmar Senha</label>
                <input type="password" th:field="*{confirmarSenha}" id="confirmarSenha" placeholder="Repita a senha" required>
                <span class="campo-erro" id="confirmar-erro"></span>
            </div>

            <input type="hidden" th:field="*{tipo}">

            <div th:if="${erroSenha}" class="alerta-erro" style="color: #ef4444; margin-bottom: 10px; font-size: 0.9em;">
                <p th:text="${erroSenha}"></p>
            </div>

            <button type="submit" class="btn-cadastrar">Finalizar Cadastro</button>

        </form>
    </div>

    <div class="card-footer">
        <a th:href="@{/login}">Já tem uma conta? Entrar </a>
    </div>
</div>



</main>

<div th:replace="~{fragments/footer :: footer}"></div>


<script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
<script th:src="@{/js/cadastro.js}"></script>
</body>
</html>

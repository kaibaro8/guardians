<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários Cadastrados</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/painel-admin.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<div th:replace="~{fragments/headeradmin :: headeradmin}"></div>

<div class="painel-card painel-card-listar-usuarios">
    <h2>Usuários Cadastrados</h2>
    <p class="painel-subtitle">Logado como <strong sec:authentication="name"></strong></p>

    <div th:if="${mensagem}" class="alerta-sucesso" th:text="${mensagem}"></div>

    <form th:action="@{/admin/listar-usuarios}" method="get">
        <div class="title-search-bar">
            <span class="section-title" style="margin:0; border:none; padding:0;">Pesquisar Usuário</span>
            <input type="text" name="busca" th:value="${busca}" placeholder="Buscar por nome ou e-mail...">
            <input type="hidden" name="size"   th:value="${size}">
            <input type="hidden" name="sortBy" th:value="${sortBy}">
            <input type="hidden" name="dir"    th:value="${dir}">
            <button type="submit" class="btn-search">🔍 Buscar</button>
            <a th:href="@{/admin/listar-usuarios}" class="btn-search-clear">Limpar</a>
        </div>
    </form>

    <div class="table-controls">
        <p class="section-title" style="margin:0;">
            Usuários Cadastrados
            <span class="badge-total" th:text="'(' + ${totalUsuarios} + ' encontrado(s))'"></span>
        </p>
        <div class="controls-right">
            <label>
                Exibir:
                <select id="selectSize" class="select-small">
                    <option th:each="op : ${sizeOptions}" th:value="${op}" th:text="${op}" th:selected="${op == size}"></option>
                </select>
                por página
            </label>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(usuarios)}" class="empty-msg">Nenhum usuário encontrado.</div>

    <div th:unless="${#lists.isEmpty(usuarios)}" class="eventos-table-wrap">
    <table class="eventos-table">
        <thead>
            <tr>
                <th class="col-nome"><a th:href="@{/admin/listar-usuarios(page=0,size=${size},sortBy='nome',dir=${sortBy=='nome' and dir=='asc'?'desc':'asc'},busca=${busca})}">Nome <span th:if="${sortBy=='nome'}" th:text="${dir=='asc'?'▲':'▼'}"></span></a></th>
                <th class="col-email"><a th:href="@{/admin/listar-usuarios(page=0,size=${size},sortBy='email',dir=${sortBy=='email' and dir=='asc'?'desc':'asc'},busca=${busca})}">E-mail <span th:if="${sortBy=='email'}" th:text="${dir=='asc'?'▲':'▼'}"></span></a></th>
                <th class="col-cpf">CPF</th>
                <th class="col-tel">Telefone</th>
                <th class="col-perfil"><a th:href="@{/admin/listar-usuarios(page=0,size=${size},sortBy='tipo',dir=${sortBy=='tipo' and dir=='asc'?'desc':'asc'},busca=${busca})}">Perfil <span th:if="${sortBy=='tipo'}" th:text="${dir=='asc'?'▲':'▼'}"></span></a></th>
                <th class="col-acoes">Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${usuarios}">
                <td class="col-nome" th:text="${u.nome}"></td>
                <td class="col-email" th:text="${u.email}"></td>
                <td class="col-cpf" th:text="${u.cpf}"></td>
                <td class="col-tel" th:text="${u.telefone}"></td>
                <td class="col-perfil">
                    <span th:if="${u.tipo == 'ROLE_ADMIN'}"    class="badge-role admin">Administrador</span>
                    <span th:if="${u.tipo == 'ROLE_OPERADOR'}" class="badge-role operador">Operador</span>
                    <span th:if="${u.tipo == 'ROLE_USER'}"     class="badge-role user">Usuário</span>
                </td>
                <td class="actions col-acoes">
                	<a href="#" class="btn-alterar btn-abrir-modal" th:data-id="${u.id}" th:data-nome="${u.nome}" th:data-tipo="${u.tipo}">Alterar Perfil</a>
                    <form th:action="@{/admin/deletarUsuario/{id}(id=${u.id})}" method="post" style="display:inline" onsubmit="return confirm('Confirma exclusão?')">
                        <button type="submit" class="btn-excluir">Excluir</button>
                    </form>
                    
                </td>
            </tr>
        </tbody>
    </table>
    </div>

    <div class="paginacao" th:if="${totalPages > 1}">
        <a th:href="@{/admin/listar-usuarios(page=${currentPage-1},size=${size},sortBy=${sortBy},dir=${dir},busca=${busca})}" th:classappend="${currentPage==0}?'disabled'" class="btn-page">← Anterior</a>
        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/admin/listar-usuarios(page=${i},size=${size},sortBy=${sortBy},dir=${dir},busca=${busca})}" th:text="${i+1}" th:classappend="${i==currentPage}?'active'" class="btn-page"></a>
        </span>
        <a th:href="@{/admin/listar-usuarios(page=${currentPage+1},size=${size},sortBy=${sortBy},dir=${dir},busca=${busca})}" th:classappend="${currentPage==totalPages-1}?'disabled'" class="btn-page">Próximo →</a>
    </div>

    <div class="painel-footer">
        <a th:href="@{/admin/usuarios}">+ Cadastrar novo usuário</a> &nbsp;|&nbsp;
        <a th:href="@{/}">← Voltar para o Início</a>
    </div>
</div>

<div class="modal-overlay" id="modalPerfil">
    <div class="modal-box">
        <h3>Alterar Perfil</h3>
        <p>Usuário: <strong id="modalNome"></strong></p>
        <form th:action="@{/admin/alterarPerfil}" method="post">
            <input type="hidden" id="modalId" name="id">
            <input type="hidden" name="busca"  th:value="${busca}">
            <input type="hidden" name="page"   th:value="${currentPage}">
            <input type="hidden" name="size"   th:value="${size}">
            <input type="hidden" name="sortBy" th:value="${sortBy}">
            <input type="hidden" name="dir"    th:value="${dir}">
            <label>Novo Perfil</label>
            <select id="modalTipo" name="tipo">
                <option value="ROLE_USER">Usuário Comum</option>
                <option value="ROLE_OPERADOR">Operador</option>
                <option value="ROLE_ADMIN">Administrador</option>
            </select>
            <div class="modal-actions">
                <button type="button" class="btn-modal-cancelar" onclick="fecharModal()">Cancelar</button>
                <button type="submit" class="btn-modal-salvar">Salvar</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/usuarios.js}"></script>
<script type="module" th:src="@{/js/script.js}"></script>
</body>
</html>

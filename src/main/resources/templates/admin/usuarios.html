<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Usuário | Painel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/painel-admin.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<div th:replace="~{fragments/headeradmin :: headeradmin}"></div>

<div class="painel-card">
    <h2>Gerenciar Usuários</h2>
    <p class="painel-subtitle">Logado como <strong sec:authentication="name"></strong></p>

    <div th:if="${mensagem}" class="alerta-sucesso" th:text="${mensagem}"></div>

    <p class="section-title">Novo Usuário</p>
    <form th:action="@{/admin/salvar-usuario}" th:object="${cadastroDTO}" method="post">
        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" th:field="*{nome}" placeholder="Nome do usuário" required>
            <span class="error-msg" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
        </div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" th:field="*{email}" placeholder="email@exemplo.com" required>
            <span class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>
        <div class="row-2">
            <div class="form-group">
                <label>CPF</label>
			<input type="text" th:field="*{cpf}" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
			<span class="campo-erro" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></span>
			<span class="campo-erro" th:if="${#fields.hasErrors('cpfValido')}" th:errors="*{cpfValido}"></span>
            </div>
            <div class="form-group">
                <label>Telefone / WhatsApp</label>
                <input type="text" th:field="*{telefone}" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
                <span class="error-msg" th:if="${#fields.hasErrors('telefone')}" th:errors="*{telefone}"></span>
            </div>
        </div>
        <div class="form-group">
            <label>Senha Inicial</label>
            <input type="password" th:field="*{senha}" placeholder="Min. 8 caracteres, 1 maiúscula, 1 número, 1 especial" required>
            <span class="error-msg" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></span>
        </div>
        <div class="form-group">
            <label>Perfil</label>
            <select th:field="*{tipo}" class="select-perfil">
                <option value="ROLE_USER">Usuário Comum</option>
                <option value="ROLE_OPERADOR">Operador</option>
                <option value="ROLE_ADMIN">Administrador</option>
            </select>
        </div>
        <div th:if="${erroSenha}" class="alerta-erro" th:text="${erroSenha}"></div>
        <button type="submit" class="btn-publicar">CADASTRAR USUÁRIO</button>
    </form>

    <div class="painel-footer">
        <a th:href="@{/admin/listar-usuarios}">Ver usuários cadastrados</a> &nbsp;|&nbsp;
        <a th:href="@{/}">Voltar para o Início</a>
    </div>
</div>

<script th:src="@{/js/usuarios.js}"></script>
<script type="module" th:src="@{/js/script.js}"></script>
</body>
</html>

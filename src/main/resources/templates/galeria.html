<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria — Guardiãs das Águas</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- BOTÃO ADMIN -->
<div class="painel-admin"
     sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_OPERADOR')">
    <a th:href="@{/operador/painel}" class="toggle-sidebar" aria-label="Abrir painel">
        <img th:src="@{/img/btn-engrenagem.png}" alt="Painel Admin" width="32" height="32">
    </a>
</div>

<main>

    <section class="galeria-hero">
        <h1>Galeria</h1>
        <p>Fotos das atividades realizadas pelas Guardiãs das Águas, organizadas por evento.</p>
    </section>

    <div class="filtros-regiao" id="galeria-filtros"></div>

    <section class="galeria-grid" id="galeria-grid"></section>

</main>

<div class="galeria-lightbox" id="galeria-lightbox"></div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- SCRIPTS -->
<script type="module" th:src="@{/js/script.js}"></script>
<script type="module">
    import { iniciarGaleria } from "/js/galeria.js";
    document.addEventListener("DOMContentLoaded", iniciarGaleria);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Agenda de Eventos — Guardiãs das Águas </title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="painel-admin"
     sec:authorize="isAuthenticated() and hasAnyAuthority('ROLE_ADMIN','ROLE_OPERADOR')">
    <a th:href="@{/operador/painel}" class="toggle-sidebar" aria-label="Abrir painel">
        <img th:src="@{/img/btn-engrenagem.png}" alt="Painel Admin" width="32" height="32">
    </a>
</div>

<main>

    <section class="agenda-hero">
        <h1>Agenda de Eventos</h1>
        <p>Acompanhe os próximos mutirões, oficinas e encontros do Guardiãs das Águas.</p>
    </section>

    <section class="agenda-layout">

        <!-- O JS renderiza todo o calendário aqui -->
        <div id="agenda-calendario"></div>

        <!-- O JS renderiza os detalhes do dia aqui -->
        <div class="agenda-detalhes" id="agenda-detalhes">
            <p class="agenda-vazio">Selecione um dia para ver os eventos.</p>
        </div>

    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/script.js}" type="module"></script>
<script th:src="@{/js/csrf.js}"></script>
<script th:src="@{/js/agenda.js}"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Núcleos pelo Brasil — Guardiãs das Águas</title>

    <script>
        (function(){
            var t = localStorage.getItem("guardias-tema");
            if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
        })();
    </script>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/darkmode.css}">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- BOTÃO ADMIN -->
<div class="painel-admin"
     sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_OPERADOR')">
    <a th:href="@{/operador/painel}" class="toggle-sidebar" aria-label="Abrir painel">
        <img th:src="@{/img/btn-engrenagem.png}" alt="Painel Admin" width="32" height="32">
    </a>
</div>

<main>

    <section class="projeto-geral-hero">
        <h1>Núcleos pelo Brasil</h1>
        <p>Veja até onde o Guardiãs das Águas já chegou. Clique em um marcador para conhecer o projeto daquela região.</p>
    </section>

    <section class="mapa has-shown">
        <div class="container">

            <div class="mapa-ano-filtro" id="mapa-ano-filtro"></div>

            <section class="mapa-brasil-secao">
                <div class="mapa-brasil-wrap">
                    <div id="mapa-brasil"></div>
                </div>
                <div class="mapa-brasil-cards" id="mapa-brasil-cards"></div>
            </section>

        </div>
    </section>

</main>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- SCRIPTS -->
<script type="module" th:src="@{/js/script.js}"></script>

</body>
</html>
